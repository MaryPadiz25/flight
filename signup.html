<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create a Student Account — Skyline Flight School</title>
<meta name="description" content="Create a free Skyline Flight School student account to browse instructor and aircraft availability and book your first lesson.">
<link rel="stylesheet" href="css/styles.css">
<style>
  .auth-wrap{ min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
  .auth-visual{ background:radial-gradient(120% 140% at 15% 0%, var(--sky-deep-2) 0%, var(--sky-deep) 55%, #060F21 100%); color:#fff; padding:56px; display:flex; flex-direction:column; justify-content:space-between; }
  .auth-form-side{ display:flex; align-items:center; justify-content:center; padding:40px; }
  .auth-box{ width:100%; max-width:400px; }
  .auth-box h1{ font-size:26px; color:var(--sky-deep); margin-bottom:6px; }
  .auth-box p.sub{ color:var(--ink-soft); font-size:14.5px; margin-bottom:26px; }
  .auth-foot{ margin-top:20px; font-size:13.5px; color:var(--ink-soft); text-align:center; }
  @media (max-width:860px){ .auth-visual{ display:none; } }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-visual">
    <a class="brand" href="index.html"><svg viewBox="0 0 32 32" fill="none"><path d="M16 2 L18.5 13 L29 16 L18.5 17.5 L17 29 L15 17.5 L4.5 16 L15 13 Z" fill="#E8A33D"/></svg>Skyline</a>
    <div>
      <p class="eyebrow" style="color:var(--beacon);">First flight starts here</p>
      <h2 style="color:#fff; font-size:32px; margin:14px 0 12px;">No experience required. No paperwork to start browsing.</h2>
      <p style="color:rgba(255,255,255,0.65); max-width:380px;">Create your account, look at real open lesson slots, and book when you're ready.</p>
    </div>
    <p style="font-size:12.5px; color:rgba(255,255,255,0.4);">© 2026 Skyline Flight School</p>
  </div>

  <div class="auth-form-side">
    <div class="auth-box">
      <h1>Create your student account</h1>
      <p class="sub">Takes under a minute.</p>

      <form id="signupForm">
        <div class="field-row">
          <div class="field"><label for="fname">First name</label><input id="fname" required></div>
          <div class="field"><label for="lname">Last name</label><input id="lname" required></div>
        </div>
        <div class="field"><label for="email">Email</label><input id="email" type="email" required></div>
        <div class="field"><label for="phone">Phone</label><input id="phone" type="tel" required></div>
        <div class="field"><label for="pw">Password</label><input id="pw" type="password" required></div>
        <div class="field">
          <label for="goal">Training goal</label>
          <select id="goal">
            <option>Discovery flight</option>
            <option>Recreational Pilot Licence</option>
            <option>Private Pilot Licence</option>
            <option>Instrument Rating</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Create account</button>
      </form>
      <p class="auth-foot">Already have an account? <a href="login.html" style="color:var(--beacon-deep); font-weight:600;">Log in</a></p>
    </div>
  </div>
</div>

<script type="module">
  import { demoSignIn } from './js/firebase-init.js';
  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    // TODO(firebase): createUserWithEmailAndPassword(auth, email, password)
    // then setDoc(doc(db,'users',uid), { role:'student', name, email, phone, balance:0, createdAt:serverTimestamp() })
    demoSignIn('student');
    window.location.href = 'app/student.html';
  });
</script>
</body>
</html>
